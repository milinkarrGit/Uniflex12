

# --- Configuration de la Source de Données ---
# Format : ${NOM_VARIABLE:VALEUR_PAR_DEFAUT}
# En local, il utilisera localhost. Sur Render, il utilisera la variable MYSQL_URL.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/uniflex_db}

# Utilise 'root' par défaut pour le local si c'est ton cas, sinon remplace root
spring.datasource.username=${MYSQLUSER:root}

# Ton mot de passe local 'tc' sera utilisé par défaut
spring.datasource.password=${MYSQLPASSWORD:janvier2004}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuration JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Configuration du Port ---
# Render impose son port, sinon 8080 en local
server.port=${PORT:8080}